[project]
name = "aware_meta_service_protocol"
version = "0.1.0"
description = "Public generated API client and service protocol boundary for Meta Graph-OS commit authority and commit fan-out."
authors = [{ name = "Aware Automations" }]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aware_meta_service_dto",
    "aware-utils",
    "pydantic>=2.8.0,<3.0.0"
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["aware_meta_service_protocol"]
include = ["README.md", "aware_meta_service_protocol/py.typed"]
