aware_api = 1

[api]
package_name = "meta-service-api"
fqn_prefix = "aware_meta_service_api"
version_number = 1
title = "Meta Service API"
description = "Public generated API client and service protocol boundary for Meta Graph-OS commit authority and commit fan-out."

[build]
sources_dir = "bindings"
include_paths = ["**/*.aware"]
exclude_paths = []
force_fresh_scan = true
compilation_mode = "api_ontology"

[targets.python]
root_dir = "python"

[targets.python.public_package]
package_dir = "aware_meta_service_api"

[targets.python.service_protocol]
package_dir = "aware_meta_service_protocol"

[[dependencies]]
package_name = "meta-service-dto"

[[semantic_package_exports]]
kind = "api_dto"
package_name = "meta-service-dto"
manifest_path = "dto/aware.toml"
