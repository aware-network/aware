aware_ontology = 1

[ontology]
package_name = "meta-ontology"
fqn_prefix = "aware_meta"
version_number = 1
title = "Meta"
description = "SSOT canonical (.aware) sources for meta - The Ontology to model the Graph Protocols"
source_manifest = "structure/aware.toml"
package_root = "."
sources_root = "structure/aware"
stable_ids_ownership = "compiler"
stable_ids_parity_policy = "error"
stable_ids_resolution_policy = "class_strict"
function_impl_ownership = "compiler"
function_impl_parity_policy = "error"

[runtime]
manifest = "runtime/python/pyproject.toml"
project_name = "aware-meta"
import_root = "aware_meta"

[layout]
profile = "ontology_structure_v1"

[[dependencies]]
package_name = "code-ontology"

[[dependencies]]
package_name = "content-ontology"

[[dependencies]]
package_name = "history-ontology"
