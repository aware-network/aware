aware_api = 1

[api]
package_name = "api-service-api"
fqn_prefix = "aware_api_service_api"
version_number = 1
title = "API Service API"
description = "Canonical API boundary for API ingress operation DTO ownership and future API service capabilities."

[build]
sources_dir = "bindings"
include_paths = ["**/*.aware"]
exclude_paths = []
force_fresh_scan = true
compilation_mode = "api_ontology"

[targets.python]
root_dir = "python"

[targets.python.public_package]
package_dir = "aware_api_service_api"

[targets.python.service_protocol]
package_dir = "aware_api_service_protocol"

[[dependencies]]
package_name = "api-service-dto"

[[semantic_package_exports]]
kind = "api_dto"
package_name = "api-service-dto"
manifest_path = "dto/aware.toml"
