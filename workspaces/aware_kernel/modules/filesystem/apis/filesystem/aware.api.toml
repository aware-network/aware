aware_api = 1

[api]
package_name = "file-system-service-api"
fqn_prefix = "aware_file_system_service_api"
version_number = 1
title = "FileSystem Service API"
description = "Public API boundary for canonical FileSystem observation, delta exchange, apply, and backend capability receipts."

[build]
sources_dir = "bindings"
include_paths = ["**/*.aware"]
exclude_paths = []
force_fresh_scan = true
compilation_mode = "api_ontology"

[targets.python]
root_dir = "python"

[targets.python.public_package]
package_dir = "aware_file_system_service_api"

[targets.python.service_protocol]
package_dir = "aware_file_system_service_protocol"

[[dependencies]]
package_name = "file-system-service-dto"

[[semantic_package_exports]]
kind = "api_dto"
package_name = "file-system-service-dto"
manifest_path = "dto/aware.toml"
