[project]
name = "aware-file-system-sdk"
version = "0.1.0"
description = "Handwritten FileSystem SDK facade over generated FileSystem and Code API DTOs."
authors = [{ name = "AWARE Team" }]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "aware-file-system",
  "aware_code_service_api",
  "aware_code_service_dto",
  "aware_file_system_service_api",
  "aware_file_system_service_dto",
]

[tool.uv.sources]
aware-file-system = { workspace = true }

[project.optional-dependencies]
test = [
  "pytest>=8.4.2",
  "pytest-asyncio>=0.23.7",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["aware_file_system_sdk"]
include = ["README.md", "aware_file_system_sdk/py.typed"]
